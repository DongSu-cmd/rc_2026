<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gong_rc_2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef3fb;
    padding:40px 20px;
    color:#333;
}

.container{
    max-width:1100px;
    margin:auto;
}

.hero{
    background:linear-gradient(135deg,#4f6fff,#4fa3ff);
    color:white;
    padding:60px;
    border-radius:30px;
    box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

.badge{
    display:inline-block;
    background:rgba(255,255,255,0.15);
    padding:8px 16px;
    border-radius:999px;
    margin-bottom:20px;
    font-size:14px;
}

.hero h1{
    font-size:60px;
    margin-bottom:15px;
}

.hero p{
    font-size:18px;
    line-height:1.7;
    max-width:700px;
}

.buttons{
    margin-top:30px;
}

.btn{
    display:inline-block;
    padding:14px 24px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    margin-right:12px;
}

.btn-white{
    background:white;
    color:#4f6fff;
}

.btn-dark{
    background:#3b4fc4;
    color:white;
}

.grid{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.card h2{
    margin-bottom:20px;
    color:#4f6fff;
}

.info{
    margin-bottom:10px;
}

.schedule-item{
    padding:12px;
    border-left:5px solid #4f6fff;
    background:#f5f8ff;
    margin-bottom:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

    <section class="hero">

        <div class="badge">
            🚗 Autocar Project Class
        </div>

        <h1>gong_rc_2026</h1>

        <p>
            공주대학교 Autocar 프로젝트 페이지입니다.
            GitHub, Python, ROS2 기반 자율주행 RC카 개발 과정을
            기록하고 공유합니다.
        </p>

        <div class="buttons">
            <a href="#" class="btn btn-white">
                📄 구글 슬라이드 보기
            </a>

            <a href="https://github.com/DongSu-cmd/rc_2026"
               class="btn btn-dark">
                GitHub Repository
            </a>
        </div>

    </section>

    <div class="grid">

        <div class="card">
            <h2>수업 정보</h2>

            <div class="info">
                <strong>프로젝트명</strong><br>
                gong_rc_2026
            </div>

            <div class="info">
                <strong>개발환경</strong><br>
                Ubuntu 22.04 / ROS2 Humble
            </div>

            <div class="info">
                <strong>언어</strong><br>
                Python
            </div>
        </div>

        <div class="card">
            <h2>수업 일정</h2>

            <div class="schedule-item">
                오리엔테이션 및 환경설정
            </div>

            <div class="schedule-item">
                GitHub 기초 및 협업
            </div>

            <div class="schedule-item">
                Python 프로그래밍
            </div>

            <div class="schedule-item">
                ROS2 실습
            </div>
        </div>

    </div>

</div>

</body>

</html>
