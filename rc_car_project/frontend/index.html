<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RC Car Controller</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- 자동차 -->
    <img id="car" src="car.png" alt="RC Car">

    <!-- 컨트롤 패널 -->
    <div class="container">

        <h1>RC Car Controller</h1>

        <div class="status">

            <p>
                Battery :
                <span id="battery">100</span>%
            </p>

            <p>
                Distance :
                <span id="distance">0.0</span> m
            </p>

        </div>

        <div class="controls">

            <button id="forward">▲</button>

            <div class="middle">

                <button id="left">◀</button>

                <button id="right">▶</button>

            </div>

            <button id="backward">▼</button>

        </div>

        <br>

        <small>
            Keyboard : ↑ ↓ ← →
        </small>

    </div>

    <script src="app.js"></script>

</body>

</html>
